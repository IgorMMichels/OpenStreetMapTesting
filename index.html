<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OSM Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; }
        #map { height: 100vh; width: 100%; }
        .btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 8px 12px;
            background: white;
            border: 1px solid #999;
            cursor: pointer;
        }
        .popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            max-width: 300px;
        }
        .popup-box h3 { margin: 0 0 10px; }
        .popup-box p { margin: 0 0 15px; color: #666; }
        .popup-box button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .popup-box .allow { background: #28a745; color: white; border: none; }
        .popup-box .skip { background: #ccc; border: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button class="btn" onclick="toggle()">Satelite</button>

    <!-- Geolocation prompt -->
    <div id="geoPopup" class="popup">
        <div class="popup-box">
            <h3>Enable location?</h3>
            <p>Allow location access to see your position on the map.</p>
            <button class="allow" onclick="allowGeo()">Allow</button>
            <button class="skip" onclick="skipGeo()">Skip</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let isSatellite = false;
        let tiles;
        const map = L.map('map');

        function loadTiles(type) {
            if (tiles) map.removeLayer(tiles);
            if (type === 'satellite') {
                tiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 18,
                    attribution: 'Esri'
                });
            } else {
                tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    attribution: 'OSM'
                });
            }
            tiles.addTo(map);
        }

        function toggle() {
            isSatellite = !isSatellite;
            loadTiles(isSatellite ? 'satellite' : 'streets');
            document.querySelector('.btn').textContent = isSatellite ? 'Ruas' : 'Satelite';
        }

        function init(lat, lon) {
            document.getElementById('geoPopup').style.display = 'none';
            map.setView([lat, lon], 15);
            loadTiles('streets');
            L.marker([lat, lon]).addTo(map).bindPopup('Voce aqui').openPopup();
        }

        function initJoinville() {
            init(-26.3039, -48.8458);
        }

        function allowGeo() {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (p) => init(p.coords.latitude, p.coords.longitude),
                    () => initJoinville(),
                    { enableHighAccuracy: false, timeout: 5000 }
                );
            } else {
                initJoinville();
            }
        }

        function skipGeo() {
            initJoinville();
        }
    </script>
</body>
</html>
